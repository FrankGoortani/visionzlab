name: IndexNow

# Ping Bing + Yandex immediately when HTML or sitemap.xml changes.
# Bing forwards the submission to Yandex automatically.

on:
  push:
    branches: [main]
    paths:
      - '**/*.html'
      - 'sitemap.xml'

concurrency:
  group: indexnow-${{ github.ref }}
  cancel-in-progress: true

jobs:
  submit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Submit changed URLs to IndexNow
        run: |
          set -euo pipefail
          HOST="visionzlab.com"
          KEY="78f888072235b3e12856407f854a166f"
          KEY_LOCATION="https://${HOST}/${KEY}.txt"

          mapfile -t CHANGED < <(git diff --name-only HEAD~1 HEAD -- '*.html' 'sitemap.xml' || true)

          if [ "${#CHANGED[@]}" -eq 0 ]; then
            echo "No HTML/sitemap changes — skipping IndexNow submission."
            exit 0
          fi

          URLS=()
          for f in "${CHANGED[@]}"; do
            [ -z "$f" ] && continue
            case "$f" in
              index.html)        URLS+=("https://${HOST}/") ;;
              */index.html)      URLS+=("https://${HOST}/${f%index.html}") ;;
              *)                 URLS+=("https://${HOST}/${f}") ;;
            esac
          done

          echo "Submitting ${#URLS[@]} URLs to IndexNow:"
          printf '  %s\n' "${URLS[@]}"

          PAYLOAD=$(jq -n \
            --arg host "$HOST" \
            --arg key "$KEY" \
            --arg keyLocation "$KEY_LOCATION" \
            --argjson urlList "$(printf '%s\n' "${URLS[@]}" | jq -R . | jq -s .)" \
            '{host: $host, key: $key, keyLocation: $keyLocation, urlList: $urlList}')

          HTTP_CODE=$(curl -sS -o /tmp/indexnow.out -w '%{http_code}' \
            -X POST https://api.indexnow.org/indexnow \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD")

          echo "IndexNow response: HTTP $HTTP_CODE"
          cat /tmp/indexnow.out || true

          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "202" ]; then
            exit 1
          fi
